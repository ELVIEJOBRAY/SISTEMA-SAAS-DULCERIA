# VARIANTE NO CANONICA
# Este archivo no es el compose principal del proyecto.
# Usar preferentemente el docker-compose.yml de la raiz.
# Mantener este archivo solo para escenarios alternos, legado o soporte.
# SISTEMA-SAAS-DULCERIA - DOCKER COMPOSE PRODUCCIÓN (MODIFICADO)
name: sistema-saas-dulceria

networks:
  red-frontend:
    driver: bridge
  red-backend:
    driver: bridge
  red-base-datos:
    driver: bridge
  red-monitoreo:
    driver: bridge

volumes:
  datos-postgres:
    name: sgdd-postgres-data
  datos-redis:
    name: sgdd-redis-data
  datos-prometheus:
    name: sgdd-prometheus-data
  datos-grafana:
    name: sgdd-grafana-data

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgdd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-__SET_IN_ENV__}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      TZ: America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - datos-postgres:/var/lib/postgresql/data
      - ../base_datos/scripts_sql:/docker-entrypoint-initdb.d
    networks:
      - red-base-datos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sgdd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - datos-redis:/data
    command: redis-server --appendonly yes
    networks:
      - red-backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../servidor
      dockerfile: Dockerfile
    container_name: sgdd-backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=desarrollo
      - DEBUG=True
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://app_user:__SET_IN_ENV__@postgres:5432/app_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-__SET_IN_ENV__}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../servidor:/app
    networks:
      - red-backend
      - red-base-datos
    command: >
      sh -c "
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../cliente
      dockerfile: Dockerfile
    container_name: sgdd-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=desarrollo
    ports:
      - "5173:5173"
    # depends_on:  # COMENTADO TEMPORALMENTE
    #   backend:
    #     condition: service_healthy
    volumes:
      - ../cliente:/app
      - /app/node_modules
    networks:
      - red-frontend
    command: >
      sh -c "
        npm run dev -- --host
      "

  nginx:
    image: nginx:alpine
    container_name: sgdd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ../cliente/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - red-frontend
      - red-backend

  prometheus:
    image: prom/prometheus:latest
    container_name: sgdd-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoreo/prometheus.yml:/etc/prometheus/prometheus.yml
      - datos-prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - red-monitoreo

  grafana:
    image: grafana/grafana:latest
    container_name: sgdd-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - datos-grafana:/var/lib/grafana
      - ./monitoreo/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoreo/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - red-monitoreo



