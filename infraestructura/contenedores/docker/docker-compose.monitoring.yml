# VARIANTE NO CANONICA
# Este archivo no es el compose principal del proyecto.
# Usar preferentemente el docker-compose.yml de la raiz.
# Mantener este archivo solo para escenarios alternos, legado o soporte.

services:

  nginx:
    image: nginx:stable
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  frontend:
    build: ../../cliente
    ports:
      - "3000:3000"

  backend:
    build: ../../servidor
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app_user:__SET_IN_ENV__@postgres:5432/app_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-__SET_IN_ENV__}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  kafka:
    image: confluentinc/cp-kafka:7.5.0

volumes:
  postgres_data:



